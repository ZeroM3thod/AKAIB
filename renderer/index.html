<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDash</title>
    <link rel="stylesheet" href="styles/globals.css">
</head>
<body>
    <div class="topbar">
        <div class="logo">DailyDash</div>
        <div id="current-date">Saturday, 6 June 2026</div>
        <div>
            <button onclick="TransactionModals.open('expense')" style="background: var(--loss-bg); color: var(--loss); border: 1px solid var(--loss); padding: 5px 10px; border-radius: 4px; cursor: pointer;">+ Add Expense</button>
            <button onclick="TransactionModals.open('income')" style="background: var(--profit-bg); color: var(--profit); border: 1px solid var(--profit); padding: 5px 10px; border-radius: 4px; cursor: pointer;">+ Add Money</button>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="nav-tab active" data-page="today">Today</div>
        <div class="nav-tab" data-page="calendar">Calendar</div>
        <div class="nav-tab" data-page="finance">Finance</div>
        <div class="nav-tab" data-page="transactions">Transactions</div>
        <div class="nav-tab" data-page="settings">Settings</div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <!-- Sidebar content will be loaded here -->
            <div style="padding: 20px;">
                <h3 style="color: var(--text3); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px;">Today's Finance</h3>
                <div style="font-size: 1.5rem; margin-bottom: 20px;">৳<span id="total-balance">0</span></div>
                
                <div style="margin-bottom: 10px; color: var(--text2);">Today Spent: <span id="today-spent" style="color: var(--loss);">৳0</span></div>
            </div>
        </div>
        <div class="main-content" id="page-content">
            <!-- Dynamic page content will be loaded here -->
            <div style="padding: 20px;">
                <h2>Welcome to DailyDash</h2>
                <p style="color: var(--text3); margin-top: 10px;">Initializing your dashboard...</p>
                <div id="habit-list-test" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script src="js/today.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/finance.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
